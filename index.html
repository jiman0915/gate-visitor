<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eastmen Gate - Drop-off Registration</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', sans-serif;
    background: #f5f1ea;
    color: #2a2a2a;
    padding: 20px;
    max-width: 600px;
    margin: 0 auto;
    min-height: 100vh;
  }
  h1 {
    font-size: 22px;
    text-align: center;
    background: #8b6f47;
    color: #fff;
    padding: 18px;
    border-radius: 8px;
    margin-bottom: 20px;
  }
  .subtitle {
    text-align: center;
    font-size: 13px;
    color: #666;
    margin-bottom: 20px;
  }
  .lang-tabs {
    display: flex;
    gap: 6px;
    margin-bottom: 20px;
  }
  .lang-tabs button {
    flex: 1;
    padding: 10px;
    border: 2px solid #8b6f47;
    background: #fff;
    color: #8b6f47;
    font-weight: bold;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
  }
  .lang-tabs button.active {
    background: #8b6f47;
    color: #fff;
  }
  label {
    display: block;
    font-weight: bold;
    margin: 15px 0 6px;
    font-size: 14px;
  }
  .req { color: #c0392b; }
  input[type="text"], textarea {
    width: 100%;
    padding: 12px;
    border: 1px solid #ccc;
    border-radius: 6px;
    font-size: 15px;
    font-family: inherit;
  }
  textarea {
    min-height: 70px;
    resize: vertical;
  }
  .photo-section {
    background: #fff;
    border: 2px dashed #8b6f47;
    border-radius: 8px;
    padding: 15px;
    text-align: center;
  }
  .photo-btn {
    display: inline-block;
    background: #8b6f47;
    color: #fff;
    padding: 12px 20px;
    border-radius: 6px;
    cursor: pointer;
    font-weight: bold;
    margin-top: 5px;
  }
  #photoInput { display: none; }
  .photo-preview {
    display: flex;
    gap: 8px;
    margin-top: 12px;
    flex-wrap: wrap;
    justify-content: center;
  }
  .photo-preview img {
    width: 80px;
    height: 80px;
    object-fit: cover;
    border-radius: 6px;
    border: 1px solid #ccc;
  }
  .photo-count {
    font-size: 12px;
    color: #666;
    margin-top: 8px;
  }
  .submit-btn {
    width: 100%;
    background: #2c8b47;
    color: #fff;
    padding: 16px;
    border: none;
    border-radius: 8px;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
    margin-top: 25px;
  }
  .submit-btn:disabled {
    background: #aaa;
    cursor: not-allowed;
  }
  .status {
    text-align: center;
    margin-top: 15px;
    padding: 12px;
    border-radius: 6px;
    font-size: 14px;
    display: none;
  }
  .status.success {
    background: #d4edda;
    color: #155724;
    display: block;
  }
  .status.error {
    background: #f8d7da;
    color: #721c24;
    display: block;
  }
  .status.loading {
    background: #fff3cd;
    color: #856404;
    display: block;
  }
  footer {
    text-align: center;
    margin-top: 25px;
    font-size: 11px;
    color: #888;
  }
</style>
</head>
<body>

<h1 id="title">Eastmen Gate Drop-off</h1>
<p class="subtitle" id="subtitle">Please fill in your details if leaving items at the gate.</p>

<div class="lang-tabs">
  <button class="active" onclick="setLang('en', event)">English</button>
  <button onclick="setLang('zh', event)">中文</button>
  <button onclick="setLang('ms', event)">Melayu</button>
</div>

<form id="visitorForm">
  <label id="labelCompany">Company Name <span class="req">*</span></label>
  <input type="text" id="company" required>

  <label id="labelName">Your Name <span class="req">*</span></label>
  <input type="text" id="visitorName" required>

  <label id="labelMemo">Note (optional)</label>
  <textarea id="memo"></textarea>

  <label id="labelPhoto">Photos <span class="req">*</span> <span style="font-weight:normal;font-size:12px;color:#666;">(max 3)</span></label>
  <div class="photo-section">
    <input type="file" id="photoInput" accept="image/*" multiple capture="environment">
    <label for="photoInput" class="photo-btn" id="photoBtnText">📷 Take / Choose Photos</label>
    <div class="photo-preview" id="photoPreview"></div>
    <div class="photo-count" id="photoCount"></div>
  </div>

  <button type="button" class="submit-btn" id="submitBtn" onclick="submitForm()">Submit</button>
  <div class="status" id="status"></div>
</form>

<footer>Eastmen Engineering Sdn. Bhd.</footer>

<script>
const i18n = {
  en: {
    title: "Eastmen Gate Drop-off",
    subtitle: "Please fill in your details if leaving items at the gate.",
    company: "Company Name",
    name: "Your Name",
    memo: "Note (optional)",
    photo: "Photos",
    photoBtn: "📷 Take / Choose Photos",
    submit: "Submit",
    sending: "Sending...",
    success: "✅ Submitted! Eastmen has been notified.",
    error: "❌ Failed to send. Please try again or contact Eastmen.",
    needPhoto: "⚠ Please attach at least 1 photo.",
    maxPhoto: "⚠ Maximum 3 photos.",
    selected: "selected"
  },
  zh: {
    title: "Eastmen 大门物品登记",
    subtitle: "如在大门处留下物品,请填写以下信息。",
    company: "公司名称",
    name: "您的姓名",
    memo: "备注(选填)",
    photo: "照片",
    photoBtn: "📷 拍照或选择照片",
    submit: "提交",
    sending: "发送中...",
    success: "✅ 已提交!Eastmen 已收到通知。",
    error: "❌ 发送失败,请重试或联系 Eastmen。",
    needPhoto: "⚠ 请至少上传 1 张照片。",
    maxPhoto: "⚠ 最多 3 张照片。",
    selected: "张已选"
  },
  ms: {
    title: "Pendaftaran di Pintu Eastmen",
    subtitle: "Sila isi maklumat anda jika meninggalkan barang di pintu.",
    company: "Nama Syarikat",
    name: "Nama Anda",
    memo: "Nota (pilihan)",
    photo: "Gambar",
    photoBtn: "📷 Ambil / Pilih Gambar",
    submit: "Hantar",
    sending: "Menghantar...",
    success: "✅ Berjaya dihantar! Eastmen telah dimaklumkan.",
    error: "❌ Gagal menghantar. Sila cuba lagi atau hubungi Eastmen.",
    needPhoto: "⚠ Sila lampirkan sekurang-kurangnya 1 gambar.",
    maxPhoto: "⚠ Maksimum 3 gambar.",
    selected: "dipilih"
  }
};

let currentLang = 'en';
let photos = [];

function setLang(lang, e) {
  currentLang = lang;
  const t = i18n[lang];
  document.getElementById('title').textContent = t.title;
  document.getElementById('subtitle').textContent = t.subtitle;
  document.getElementById('labelCompany').innerHTML = t.company + ' <span class="req">*</span>';
  document.getElementById('labelName').innerHTML = t.name + ' <span class="req">*</span>';
  document.getElementById('labelMemo').textContent = t.memo;
  document.getElementById('labelPhoto').innerHTML = t.photo + ' <span class="req">*</span> <span style="font-weight:normal;font-size:12px;color:#666;">(max 3)</span>';
  document.getElementById('photoBtnText').innerHTML = t.photoBtn;
  document.getElementById('submitBtn').textContent = t.submit;
  document.querySelectorAll('.lang-tabs button').forEach(b => b.classList.remove('active'));
  if (e) e.target.classList.add('active');
  updatePhotoCount();
}

document.getElementById('photoInput').addEventListener('change', function(e) {
  const files = Array.from(e.target.files);
  if (photos.length + files.length > 3) {
    showStatus(i18n[currentLang].maxPhoto, 'error');
    return;
  }
  files.forEach(f => photos.push(f));
  renderPhotos();
});

function renderPhotos() {
  const preview = document.getElementById('photoPreview');
  preview.innerHTML = '';
  photos.forEach(f => {
    const img = document.createElement('img');
    img.src = URL.createObjectURL(f);
    preview.appendChild(img);
  });
  updatePhotoCount();
}

function updatePhotoCount() {
  document.getElementById('photoCount').textContent =
    photos.length > 0 ? photos.length + ' ' + i18n[currentLang].selected : '';
}

function showStatus(msg, type) {
  const s = document.getElementById('status');
  s.textContent = msg;
  s.className = 'status ' + type;
}

async function submitForm() {
  const company = document.getElementById('company').value.trim();
  const visitorName = document.getElementById('visitorName').value.trim();
  const memo = document.getElementById('memo').value.trim();
  const t = i18n[currentLang];

  if (!company || !visitorName) {
    showStatus('⚠ Required fields missing.', 'error');
    return;
  }
  if (photos.length === 0) {
    showStatus(t.needPhoto, 'error');
    return;
  }

  const btn = document.getElementById('submitBtn');
  btn.disabled = true;
  showStatus(t.sending, 'loading');

  const fd = new FormData();
  fd.append('company', company);
  fd.append('visitorName', visitorName);
  fd.append('memo', memo);
  fd.append('lang', currentLang.toUpperCase());
  photos.forEach(p => fd.append('photos', p));

  try {
    const res = await fetch('https://eastmen-gate.jiman0915.workers.dev', {
      method: 'POST',
      body: fd
    });

    const data = await res.json();

    if (data.ok) {
      showStatus(t.success, 'success');
      document.getElementById('visitorForm').reset();
      photos = [];
      renderPhotos();
      setTimeout(() => { btn.disabled = false; }, 3000);
    } else {
      throw new Error(data.error || 'Unknown error');
    }
  } catch (err) {
    showStatus(t.error, 'error');
    btn.disabled = false;
  }
}

</script>

</body>
</html>
